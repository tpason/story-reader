<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Linh Quyển Các offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f7f3ea;
        color: #28231f;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        max-width: 460px;
        border: 1px solid #ded7cb;
        border-radius: 16px;
        padding: 24px;
        background: #fffdf8;
        box-shadow: 0 20px 50px rgba(45, 38, 29, 0.1);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #6f675e;
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Đang offline</h1>
      <p>Trang này chưa có trong cache. Hãy quay lại chapter đã mở trước đó, hoặc kết nối mạng để tải thêm nội dung.</p>
    </main>
  </body>
</html>
