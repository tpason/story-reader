<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Jade tablet body -->
  <rect x="5" y="1" width="14" height="22" rx="1.5" fill="#1a6b5a" stroke="#26a882" stroke-width="1.2"/>
  <!-- Top cap -->
  <rect x="5" y="1" width="14" height="3" rx="1.5" fill="#26a882"/>
  <!-- Bottom cap -->
  <rect x="5" y="20" width="14" height="3" rx="1.5" fill="#26a882"/>
  <!-- Inscription lines (gold) -->
  <line x1="9" y1="7"  x2="15" y2="7"  stroke="#f0d06a" stroke-width="0.9" stroke-linecap="round" opacity="0.85"/>
  <line x1="9" y1="10" x2="15" y2="10" stroke="#f0d06a" stroke-width="0.9" stroke-linecap="round" opacity="0.85"/>
  <line x1="9" y1="13" x2="15" y2="13" stroke="#f0d06a" stroke-width="0.9" stroke-linecap="round" opacity="0.85"/>
  <!-- Gold seal -->
  <circle cx="12" cy="17.5" r="1.5" fill="#c8962e" opacity="0.9"/>
  <!-- Seal shine -->
  <circle cx="11.4" cy="16.9" r="0.4" fill="white" opacity="0.35"/>
</svg>
